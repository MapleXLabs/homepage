<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapleX</title>
    <!-- External stylesheet for page styling -->
    <link rel="stylesheet" href="styles.css" />
    <!-- Use the SVG logo as the favicon. Modern browsers support SVG favicons,
         which ensures the logo remains crisp on high‑resolution displays. -->
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <!-- Container to center the logo -->
    <div class="logo-container">
      <!-- Reference the separate SVG logo -->
      <img src="logo.svg" alt="Logo" class="logo" />
    </div>
  </body>
</html>
